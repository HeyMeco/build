declare -g LINUXFAMILY="sa8775p"
declare -g ARCH="arm64"
declare -g SERIALCON="ttyMSM0"

case $BRANCH in

	current)
		declare -g KERNEL_MAJOR_MINOR="6.18" # Major and minor versions of this kernel.
		declare -g KERNELBRANCH='branch:linux-6.18.y'
		declare -g LINUXCONFIG="linux-uefi-arm64-current"
		declare -g -i KERNEL_GIT_CACHE_TTL=120 # 2 minutes; this is a high-traffic repo
		;;

esac

family_tweaks_bsp() {
	:
}
